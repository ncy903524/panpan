<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="盼盼">
<meta name="theme-color" content="#5b7a6e">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>盼盼睫研 · 登入</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect width='120' height='120' rx='24' fill='%235b7a6e'/%3E%3Ctext x='60' y='78' font-family='serif' font-size='62' fill='white' text-anchor='middle' opacity='0.92'%3E盼%3C/text%3E%3C/svg%3E">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'%3E%3Crect width='120' height='120' rx='24' fill='%235b7a6e'/%3E%3Ctext x='60' y='78' font-family='serif' font-size='62' fill='white' text-anchor='middle'%3E盼%3C/text%3E%3C/svg%3E">
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22%E7%9B%BC%E7%9B%BC%E7%9D%AB%E7%A0%94%22%2C%22short_name%22%3A%22%E7%9B%BC%E7%9B%BC%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%235b7a6e%22%2C%22theme_color%22%3A%22%235b7a6e%22%7D">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<!-- Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root {
  --accent: #5b7a6e;
  --accent-light: #8aab9f;
  --accent-pale: #e0ece8;
  --bg: #f5f0e8;
  --bg2: #ede8dc;
  --card: #faf7f2;
  --border: #ddd5c3;
  --text: #2c2820;
  --text2: #6b6050;
  --text3: #9a8f7e;
  --red: #c0544a;
  font-family: 'Noto Sans TC', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: var(--bg);
  display: flex; align-items: center; justify-content: center;
}

.login-shell {
  width: 100%; max-width: 390px;
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 40px 24px;
}

.logo-wrap {
  width: 80px; height: 80px;
  background: var(--accent);
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 40px; color: white;
  box-shadow: 0 8px 32px rgba(91,122,110,0.35);
  margin-bottom: 24px;
}
.brand-name {
  font-size: 26px; font-weight: 700; color: var(--text);
  letter-spacing: 2px; margin-bottom: 6px;
}
.brand-sub {
  font-size: 13px; color: var(--text3);
  margin-bottom: 48px; letter-spacing: 0.5px;
}

.login-card {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 28px 24px;
  box-shadow: 0 4px 24px rgba(60,50,35,0.1);
}
.login-title {
  font-size: 16px; font-weight: 600; color: var(--text);
  margin-bottom: 6px;
}
.login-desc {
  font-size: 12px; color: var(--text3);
  margin-bottom: 24px; line-height: 1.6;
}

.btn-google {
  width: 100%;
  display: flex; align-items: center; justify-content: center; gap: 12px;
  padding: 14px 20px;
  background: white; border: 1.5px solid #ddd5c3;
  border-radius: 12px; cursor: pointer;
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 15px; font-weight: 500; color: #2c2820;
  transition: all 0.2s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.btn-google:hover { border-color: var(--accent); box-shadow: 0 4px 16px rgba(91,122,110,0.15); }
.btn-google:active { background: var(--accent-pale); }
.btn-google svg { flex-shrink: 0; }

.divider {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0; color: var(--text3); font-size: 12px;
}
.divider::before, .divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.notice {
  margin-top: 24px;
  padding: 12px 14px;
  background: var(--accent-pale);
  border-radius: 10px;
  font-size: 12px; color: var(--accent);
  line-height: 1.6;
}

.loading-overlay {
  position: fixed; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; z-index: 999;
}
.loading-overlay.hidden { display: none; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--accent-pale);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { font-size: 14px; color: var(--text2); }

.error-msg {
  margin-top: 14px;
  padding: 10px 14px;
  background: #fcecea;
  border-radius: 8px;
  font-size: 12px; color: var(--red);
  display: none;
}
</style>
</head>
<body>

<!-- Loading overlay -->
<div class="loading-overlay" id="loading-overlay">
  <div class="spinner"></div>
  <div class="loading-text">驗證登入中…</div>
</div>

<div class="login-shell">
  <div class="logo-wrap">✦</div>
  <div class="brand-name">盼盼睫研</div>
  <div class="brand-sub">Panpan Eyelash Studio · CRM</div>

  <div class="login-card">
    <div class="login-title">歡迎回來 👋</div>
    <div class="login-desc">使用 Google 帳號登入以存取客戶管理系統</div>

    <button class="btn-google" onclick="signInWithGoogle()" id="google-btn">
      <svg width="20" height="20" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      使用 Google 帳號登入
    </button>

    <div class="error-msg" id="error-msg"></div>

    <div class="notice">
      🔒 僅限授權帳號存取。登入資訊由 Supabase 安全儲存，不會洩漏給第三方。
    </div>
  </div>
</div>

<script>
// ── 從 config.js 載入設定（部署時會注入）──
// 開發時可直接填入，正式部署請改用環境變數
const SUPABASE_URL = 'https://oglqkingzamedklujdaf.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_XsPVrZaPUEAfpw9-YEiiZQ_j3WEGTc8';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 檢查是否已登入
async function checkSession() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    // 已登入 → 跳轉 CRM
    window.location.href = 'app.html';
  } else {
    document.getElementById('loading-overlay').classList.add('hidden');
  }
}

// Google 登入
async function signInWithGoogle() {
  const btn = document.getElementById('google-btn');
  btn.disabled = true;
  btn.style.opacity = '0.6';
  hideError();

  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: {
      redirectTo: window.location.origin + '/app.html'
    }
  });

  if (error) {
    showError('登入失敗：' + error.message);
    btn.disabled = false;
    btn.style.opacity = '1';
  }
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
}
function hideError() {
  document.getElementById('error-msg').style.display = 'none';
}

// 監聽 auth 狀態
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'SIGNED_IN' && session) {
    window.location.href = 'app.html';
  }
});

checkSession();
</script>

</body>
</html>
